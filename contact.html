<!DOCTYPE html>
<html lang="en">
<head>
  ... (active на Contact)
</head>
<body>
  <header>...</header>
  <main>
    <section class="page-hero page-hero--contact">
      <div class="container" data-aos="fade-up">
        <h1>Contact Us</h1>
        <p>We're ready to discuss your trade requirements.</p>
      </div>
    </section>
    <section class="section">
      <div class="container two-columns">
        <div data-aos="fade-right">
          <h2 class="section-title section-title--left">Send an inquiry</h2>
          <form class="contact-form">
            <div class="form-group">
              <input type="text" placeholder="Full name *" required>
            </div>
            <div class="form-group">
              <input type="email" placeholder="Email *" required>
            </div>
            <div class="form-group">
              <input type="text" placeholder="Company">
            </div>
            <div class="form-group">
              <select>
                <option>Select inquiry type</option>
                <option>Sourcing inquiry</option>
                <option>Product inquiry</option>
                <option>Partnership inquiry</option>
                <option>Logistics inquiry</option>
                <option>General inquiry</option>
              </select>
            </div>
            <div class="form-group">
              <textarea placeholder="Your message *" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn--primary">Submit</button>
          </form>
        </div>
        <div data-aos="fade-left">
          <div class="info-card">
            <i class="fas fa-map-marker-alt info-card__icon"></i>
            <h4>Office</h4>
            <p>123 Trade Avenue, Canary Wharf, London, E14 5AB, United Kingdom</p>
          </div>
          <div class="info-card">
            <i class="fas fa-envelope info-card__icon"></i>
            <h4>Email</h4>
            <p>trade@goodsempire.com</p>
          </div>
          <div class="info-card">
            <i class="fas fa-phone-alt info-card__icon"></i>
            <h4>Phone</h4>
            <p>+44 20 7946 0123</p>
          </div>
          <div class="info-card">
            <i class="fab fa-whatsapp info-card__icon"></i>
            <h4>WhatsApp</h4>
            <p>+44 7911 123456</p>
          </div>
          <!-- Карта (можно вставить iframe) -->
          <div class="map-placeholder">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2483.540204950726!2d-0.023559684229760525!3d51.50329797963434!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x487602b6c1e7f3b3%3A0x3d3f3b5c1c3c3c3c!2sCanary%20Wharf%2C%20London!5e0!3m2!1sen!2suk!4v1620000000000!5m2!1sen!2suk" width="100%" height="200" style="border:0; border-radius:16px;" allowfullscreen="" loading="lazy"></iframe>
          </div>
        </div>
      </div>
    </section>
  </main>
  <footer>...</footer>
</body>
</html>
