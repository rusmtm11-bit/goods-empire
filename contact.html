<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact · Goods Empire</title>
  <meta name="description" content="Get in touch for sourcing, partnership or logistics inquiries.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="header">...</header>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1>Contact Us</h1>
        <p>We're ready to discuss your trade requirements.</p>
      </div>
    </section>

    <section class="section">
      <div class="container two-columns">
        <div>
          <h2>Send an inquiry</h2>
          <form class="contact-form">
            <input type="text" placeholder="Full name" required>
            <input type="email" placeholder="Email" required>
            <input type="text" placeholder="Company">
            <select>
              <option>Select inquiry type</option>
              <option>Sourcing inquiry</option>
              <option>Product inquiry</option>
              <option>Partnership inquiry</option>
              <option>Logistics inquiry</option>
              <option>General inquiry</option>
            </select>
            <textarea placeholder="Your message" rows="5"></textarea>
            <button type="submit" class="btn btn--primary">Submit</button>
          </form>
        </div>
        <div>
          <div class="info-card">
            <i class="fas fa-map-marker-alt info-card__icon"></i>
            <h4>Office</h4>
            <p>123 Trade Avenue, London, UK</p>
          </div>
          <div class="info-card">
            <i class="fas fa-envelope info-card__icon"></i>
            <h4>Email</h4>
            <p>trade@goodsempire.com</p>
          </div>
          <div class="info-card">
            <i class="fas fa-phone-alt info-card__icon"></i>
            <h4>Phone</h4>
            <p>+44 20 7946 0123</p>
          </div>
          <div class="info-card">
            <i class="fab fa-whatsapp info-card__icon"></i>
            <h4>WhatsApp</h4>
            <p>+44 7911 123456</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">...</footer>
  <script src="assets/js/main.js"></script>
</body>
</html>
